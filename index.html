<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter | Quick Exchange</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.7-1.38 2.9-3.12 3.16z'/></svg>">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            
            <!-- Header with Currency Icon Background -->
            <div class="card-header">
                <div class="header-bg-icons">
                    <i class="fas fa-dollar-sign"></i>
                    <i class="fas fa-euro-sign"></i>
                    <i class="fas fa-pound-sign"></i>
                    <i class="fas fa-yen-sign"></i>
                    <i class="fas fa-rupee-sign"></i>
                    <i class="fas fa-won-sign"></i>
                </div>
                <div class="header-content">
                    <div class="currency-icon-main">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                    <h1>CURRENCY CONVERTER</h1>
                    <p>Live exchange rates · Updated daily</p>
                </div>
            </div>

            <form id="converterForm">
                <!-- Amount Input Section -->
                <div class="input-group">
                    <label class="form-label">
                        <i class="fas fa-coins"></i>
                        Enter Amount
                    </label>
                    <div class="amount-input-wrapper">
                        <input type="number" id="amount" value="1" step="any" placeholder="0.00">
                        <span class="input-icon"><i class="fas fa-calculator"></i></span>
                    </div>
                </div>

                <!-- Currency Selection Row -->
                <div class="currency-row">
                    <!-- From Currency -->
                    <div class="currency-card from-card">
                        <div class="currency-label">
                            <i class="fas fa-arrow-up"></i>
                            <span>From</span>
                        </div>
                        <div class="currency-selector">
                            <div class="flag-container">
                                <img id="fromFlag" src="https://flagsapi.com/US/flat/64.png" alt="flag">
                            </div>
                            <select id="fromCurrency"></select>
                            <i class="fas fa-chevron-down selector-icon"></i>
                        </div>
                    </div>

                    <!-- Swap Icon -->
                    <div class="swap-container" id="swapBtn">
                        <div class="swap-circle">
                            <i class="fas fa-arrow-right-arrow-left"></i>
                        </div>
                    </div>

                    <!-- To Currency -->
                    <div class="currency-card to-card">
                        <div class="currency-label">
                            <i class="fas fa-arrow-down"></i>
                            <span>To</span>
                        </div>
                        <div class="currency-selector">
                            <div class="flag-container">
                                <img id="toFlag" src="https://flagsapi.com/IN/flat/64.png" alt="flag">
                            </div>
                            <select id="toCurrency"></select>
                            <i class="fas fa-chevron-down selector-icon"></i>
                        </div>
                    </div>
                </div>

                <!-- Exchange Rate Display -->
                <div class="rate-display" id="rateDisplay">
                    <div class="rate-badge">
                        <i class="fas fa-chart-line"></i>
                        <span>Exchange Rate</span>
                    </div>
                    <div class="rate-value" id="exchangeRate">
                        <div class="skeleton-loader">
                            <span></span>
                        </div>
                    </div>
                </div>

                <!-- Convert Button -->
                <button type="submit" id="convertBtn">
                    <i class="fas fa-sync-alt"></i>
                    <span>Get Exchange Rate</span>
                    <i class="fas fa-arrow-right btn-arrow"></i>
                </button>
            </form>

            <!-- Footer Note -->
            <div class="footer-note">
                <i class="fas fa-shield-alt"></i>
                <span>Real-time rates provided by ExchangeRate-API</span>
            </div>
        </div>
    </div>

    <script src="./JS/codes.js"></script>
    <script src="./JS/script.js"></script>
</body>
</html>
